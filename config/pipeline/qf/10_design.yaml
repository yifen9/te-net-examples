name: 10_design_v1

seed:
  base: 2026
  digest_size: 8
  person: te_net_lib
  spawn_key: []

lag: 1
exclude_self: true

grid:
  trials: 15
  N: [50]
  T: [30, 125, 250, 500]

dgp:
  - name: gaussian
    params:
      adj_source: ["er"]
      edge_prob: [0.05]
      coef_scale: [0.3]
      noise_scale: [1.0]
      burnin: [200]

  - name: garch_only
    params:
      k: [3]               # 修复这里：满足 k > 0 的强制要求
      omega: [0.05]
      alpha: [0.08]
      beta: [0.88]
      loading_scale: [0.0] # 依靠载荷为 0 来彻底屏蔽因子影响，实现纯 GARCH！
      burnin: [200]

  - name: factor_only
    params:
      k: [3]
      omega: [1.0]
      alpha: [0.0]
      beta: [0.0]
      loading_scale: [0.3]
      burnin: [200]

  - name: garch_factor
    params:
      k: [3]
      omega: [0.05]
      alpha: [0.08]
      beta: [0.88]
      loading_scale: [0.3]
      burnin: [200]

preprocess:
  factor_neutral:
    enabled: true
    center: true
    n_components: [0, 3]

te:
  estimators:
    - name: ols
      params:
        add_intercept: [true]

    - name: lasso
      params:
        add_intercept: [true]
        standardize: [true]
        alpha: [0.01]
        max_iter: [500]
        tol: [1.0e-8]

    - name: knn
      params:
        k_neighbors: [3]
        add_intercept: [false]

graph:
  select:
    - name: fixed_density
      params:
        density: [0.05]
        mode: ["abs"]
        exclude_self: [true]

metrics:
  hub:
    k: [5]