tables:
  - name: table_metrics_csv
    source:
      stage: metrics
      kind: csv
      path: metrics.csv
    save_tex: true
    format:
      index: false
      escape: true
      na_rep: ""
      float_format: "{:.6f}"

  - name: table_cs_tstat
    source:
      stage: cs_tstat
      kind: csv
      path: tstat.csv
    save_tex: true
    format:
      index: false
      escape: true
      na_rep: ""
      float_format: "{:.4f}"

  - name: table_cs_delta
    source:
      stage: cs_tstat
      kind: csv
      path: delta.csv
    save_tex: true
    format:
      index: false
      escape: true
      na_rep: ""
      float_format: "{:.4f}"

  - name: table_signal_report
    source:
      stage: report_signal
      kind: csv
      path: report.csv
    save_tex: true
    format:
      index: false
      escape: true
      na_rep: ""
      float_format: "{:.4f}"

figures:
  - name: fig_mechanism_precision
    kind: line
    ext: png
    also_pdf: false
    source:
      stage: report_pretty
      kind: csv
      path: mechanism_precision.csv
    x: tn_ratio
    y: precision
    group: dgp
    title: "Mechanism Decomposition: OLS-TE Precision vs T/N"
    xlabel: "T/N Ratio"
    ylabel: "OLS-TE Precision"
    figsize: [8, 4]
    dpi: 220
    marker: "o"
    linewidth: 2.0
    legend_loc: "upper right"
    vlines:
      - x: 5
        linestyle: "--"
        linewidth: 1.0
    ylim: [0.0, 1.0]

  - name: fig_horizon_robustness
    kind: bar
    ext: png
    source:
      stage: report_pretty
      kind: csv
      path: horizon_robustness.csv
    x: horizon
    y: tstat
    agg: mean
    title: "Horizon Robustness: NIO Signal (connected vs isolated)"
    xlabel: "Holding Period"
    ylabel: "t-statistic"
    figsize: [7, 4]
    dpi: 220
    hlines:
      - y: 0
        linestyle: "-"
        linewidth: 1.0
      - y: 1.96
        linestyle: "--"
        linewidth: 1.0
      - y: -1.96
        linestyle: "--"
        linewidth: 1.0
